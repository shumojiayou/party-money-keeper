<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>聚餐游戏助手</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="app-layout">
        <section id="auth-screen" class="stack">
          <header class="hero-card">
            <p class="eyebrow">Party Game Helper</p>
            <h1>聚餐游戏助手</h1>
            <p class="hero-copy">先选游戏，再创建房间或加入房间。当前支持大富翁记账和银行发钱。</p>
          </header>

          <section class="panel-card stack">
            <div class="panel-head">
              <h2>选择游戏</h2>
              <span class="panel-tag">当前可用</span>
            </div>
            <button id="monopoly-game-btn" class="game-choice is-active" type="button">
              <strong>大富翁</strong>
              <span>聚会时记账、转账、银行发钱</span>
            </button>
          </section>

          <section id="recent-rooms-panel" class="panel-card stack hidden">
            <div class="panel-head">
              <h2>暂离房间</h2>
              <span class="panel-tag">点一下继续</span>
            </div>
            <div id="recent-rooms-list" class="saved-rooms-list"></div>
          </section>

          <div id="game-forms" class="card-grid">
            <section class="panel-card">
              <div class="panel-head">
                <h2>创建房间</h2>
                <span class="panel-tag">房主默认管理银行</span>
              </div>
              <form id="create-form" class="stack">
                <label class="field">
                  <span>房间码</span>
                  <input
                    name="roomCode"
                    type="text"
                    maxlength="3"
                    inputmode="numeric"
                    pattern="[0-9]{3}"
                    placeholder="设置 3 个数字作为房间码"
                    required
                  />
                </label>
                <label class="field">
                  <span>你的名字</span>
                  <input name="playerName" type="text" maxlength="20" placeholder="例如：mjh" required />
                </label>
                <label class="field">
                  <span>玩家初始资金</span>
                  <input name="startingBalance" type="number" min="0" step="1" value="1500" required />
                </label>
                <button class="primary-btn" type="submit">创建并进入</button>
              </form>
            </section>

            <section class="panel-card">
              <div class="panel-head">
                <h2>加入房间</h2>
                <span class="panel-tag">输入别人的房间码</span>
              </div>
              <form id="join-form" class="stack">
                <label class="field">
                  <span>房间码</span>
                  <input
                    name="roomCode"
                    type="text"
                    maxlength="3"
                    inputmode="numeric"
                    pattern="[0-9]{3}"
                    placeholder="例如：123"
                    required
                  />
                </label>
                <label class="field">
                  <span>你的名字</span>
                  <input name="playerName" type="text" maxlength="20" placeholder="例如：mjh2" required />
                </label>
                <button class="primary-btn alt" type="submit">加入房间</button>
              </form>
            </section>
          </div>

          <p id="auth-message" class="inline-message" aria-live="polite"></p>
        </section>

        <section id="dashboard-screen" class="stack hidden">
          <section class="panel-card room-card">
            <h2 id="room-title">大富翁</h2>
            <p id="room-meta" class="muted-text">-</p>
          </section>

          <section class="summary-grid">
            <article class="summary-card">
              <span>我的余额</span>
              <strong id="my-balance">0</strong>
            </article>
            <article class="summary-card summary-rank-card">
              <span>我的排名</span>
              <strong id="my-rank">-</strong>
            </article>
          </section>

          <section class="content-grid">
            <article class="panel-card">
              <div class="panel-head">
                <h2>财富排行</h2>
                <span id="sync-status" class="panel-tag">同步中</span>
              </div>
              <p class="muted-text section-tip">点击其他玩家，直接给他转账。</p>
              <div id="players-list" class="players-list"></div>
            </article>

            <article id="bank-panel" class="panel-card hidden">
              <div class="panel-head">
                <h2>银行出款</h2>
                <span class="panel-tag">仅银行管理员可用</span>
              </div>
              <form id="bank-transfer-form" class="stack">
                <label class="field">
                  <span>发给谁</span>
                  <select id="bank-target" name="target" required></select>
                </label>
                <label class="field">
                  <span>金额</span>
                  <input name="amount" type="number" min="1" step="1" required />
                </label>
                <button class="primary-btn alt" type="submit">确认发钱</button>
              </form>
              <p id="bank-message" class="inline-message" aria-live="polite"></p>
            </article>

            <article id="admin-panel" class="panel-card hidden">
              <div class="panel-head">
                <h2>房主管理</h2>
                <span class="panel-tag">切换银行管理员</span>
              </div>
              <form id="bank-admin-form" class="stack">
                <label class="field">
                  <span>银行管理员</span>
                  <select id="bank-admin-select" name="bankAdminPlayerId" required></select>
                </label>
                <button class="secondary-btn" type="submit">保存设置</button>
              </form>
              <p id="admin-message" class="inline-message" aria-live="polite"></p>
            </article>

            <article class="panel-card ledger-card">
              <div class="panel-head">
                <h2>最近流水</h2>
                <span class="panel-tag">最新 30 条</span>
              </div>
              <div id="transactions-list" class="transactions-list"></div>
            </article>
          </section>

          <div class="page-actions">
            <button id="pause-room-btn" class="ghost-btn" type="button">暂离房间</button>
            <button id="exit-room-btn" class="ghost-btn danger-btn" type="button">退出房间</button>
          </div>
        </section>
      </main>
    </div>

    <div id="transfer-modal" class="modal-backdrop hidden">
      <section class="modal-card">
        <div class="modal-head">
          <h2>给 <span id="transfer-target-name">-</span> 转账</h2>
          <button id="close-transfer-btn" class="ghost-icon-btn" type="button" aria-label="关闭">×</button>
        </div>
        <form id="transfer-form" class="stack">
          <input id="transfer-player-id" name="targetPlayerId" type="hidden" />
          <label class="field">
            <span>金额</span>
            <input id="transfer-amount" name="amount" type="number" min="1" step="1" required />
          </label>
          <div class="modal-actions">
            <button id="cancel-transfer-btn" class="ghost-btn" type="button">取消</button>
            <button class="primary-btn" type="submit">确认转账</button>
          </div>
        </form>
        <p id="transfer-message" class="inline-message" aria-live="polite"></p>
      </section>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
